name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Windows release
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/build_windows_release.ps1

      - name: Resolve artifact path
        id: artifact
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | Select-Object -First 1
          $version = '0.1.0'
          if ($line) {
            $version = ($line.Matches.Groups[1].Value -split '\+')[0].Trim()
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=dist/ezbookkeeping-$version-windows-x64.zip" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 轻记账 Windows v${{ steps.artifact.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.zip }}
