name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Generate Windows icons
        run: dart run tool/generate_icons.dart .

      - name: Test
        run: flutter test

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package zip
        id: artifact
        shell: pwsh
        run: |
          $line = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$' | Select-Object -First 1
          $version = '0.1.0'
          if ($line) {
            $version = ($line.Matches.Groups[1].Value -split '\+')[0].Trim()
          }
          $distRoot = Join-Path $PWD 'dist'
          New-Item -ItemType Directory -Path $distRoot -Force | Out-Null
          $sourceDir = Join-Path $PWD 'build\windows\x64\runner\Release'
          $outDir = Join-Path $distRoot "ezbookkeeping-$version-windows-x64"
          if (Test-Path $outDir) { Remove-Item $outDir -Recurse -Force }
          Copy-Item -Path $sourceDir -Destination $outDir -Recurse
          $zipPath = Join-Path $distRoot "ezbookkeeping-$version-windows-x64.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path $outDir -DestinationPath $zipPath
          "version=$version" >> $env:GITHUB_OUTPUT
          "zip=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 轻记账 Windows v${{ steps.artifact.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.artifact.outputs.zip }}
