name: ezbookkeeping_desktop
description: 轻记账 - 个人记账软件桌面端
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # 数据库
  sqflite_common_ffi: ^2.3.4+4
  sqflite: ^2.4.1

  # 路径
  path_provider: ^2.1.5
  path: ^1.9.0

  # 桌面端
  window_manager: ^0.4.3
  system_tray: ^2.0.3
  hotkey_manager: ^0.2.3
  local_notifier: ^0.1.6

  # 网络（汇率等）
  dio: ^5.7.0

  # 模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 工具
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  decimal: ^3.0.2
  uuid: ^3.0.7
  excel: ^4.0.6
  logger: ^2.5.0
  file_picker: ^8.1.4
  cryptography: ^2.7.0

  # 图表
  fl_chart: ^0.69.2
  lunar: ^1.7.8
  line_awesome_flutter: ^3.0.1
  desktop_drop: ^0.7.1
  pasteboard: ^0.2.0
  mobile_ocr:
    git:
      url: https://github.com/AndersKlint/mobile_ocr
      ref: 6be5afd3e4e2b79d455c18d3d02ec47ee07e5989
  gbk_codec: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  image: ^4.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
    - assets/icons/tray.ico
    - assets/icons/
    - assets/images/
    - assets/data/tag_presets.txt
